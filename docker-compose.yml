services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: summit_bot
      POSTGRES_USER: summit
      POSTGRES_PASSWORD: summit
    ports:
      - "5544:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U summit -d summit_bot"]
      interval: 5s
      timeout: 5s
      retries: 20

  bot:
    build: .
    restart: unless-stopped
    command: python run.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://summit:summit@db:5432/summit_bot
    depends_on:
      db:
        condition: service_healthy

  admin:
    build: .
    restart: unless-stopped
    command: python run_admin.py
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://summit:summit@db:5432/summit_bot
      ADMIN_PANEL_PORT: 8030
    ports:
      - "8030:8030"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
