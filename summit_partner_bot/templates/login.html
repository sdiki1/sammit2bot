<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Summit Admin Login</title>
  <style>
    :root {
      --bg: #f2f4f8;
      --card: #ffffff;
      --line: #dce1ea;
      --text: #1a2130;
      --accent: #1363df;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: linear-gradient(130deg, #f2f4f8 0%, #e6eefc 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: var(--text);
    }
    .card {
      width: min(420px, 94vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 10px 24px rgba(12, 42, 90, 0.08);
    }
    h1 {
      margin: 0 0 16px;
      font-size: 22px;
    }
    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 11px 12px;
      font-size: 14px;
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 10px;
      padding: 11px 12px;
      color: #fff;
      background: var(--accent);
      font-weight: 700;
      cursor: pointer;
    }
    .error {
      margin-top: 10px;
      color: var(--danger);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Админ-панель саммита</h1>
    <form method="post" action="/login">
      <label for="username">Логин</label>
      <input id="username" type="text" name="username" required>
      <label for="password">Пароль</label>
      <input id="password" type="password" name="password" required>
      <button type="submit">Войти</button>
    </form>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
  </main>
</body>
</html>
